services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - forge_pg_data:/var/lib/postgresql/data
    
  backend:
    build: ./backend
    volumes:
      - ./backend:/app
      - /app/node_modules
      - /app/src/generated
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: ${DOCKER_DB_URL}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  forge_pg_data: